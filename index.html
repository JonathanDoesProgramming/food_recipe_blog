<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <title>Food-recipe-blog - Learn how to cook!</title>
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <div class="logo-container">
                    <img class="nav-logo" src="image/logo.png" alt="navigation logo">
                </div>
                <ul>
                    <li><a href="#home">Get started</a></li>
                    <li><a href="#overview">Overview</a></li>
                    <li><a href="#favorite">Favorite</a></li>
                    <li><a href="#popular">Popular</a></li>
                    <li><a href="#categories">Categories</a></li>
                    <li><a href="#feedback">Feedback</a></li>
                    <li><a href="#contacts">Contacts</a></li>
                </ul>
            </nav>
        </header>
        <main>

            <section class="home-container" id="home">
                <div>
                    <h1 class="home-heading">Global Flavors at Home: Easy Recipes Inspired🍴</h1>
                    <p class="home-paragraph">
                    Forget something?
                    Here's your guide, food-to-go where you can cook at the food you crave for.
                    </p>
                    <button class="home-button"><a href="">Get Started</a></button>
                </div>
                <!-- <h1 class="home-heading">Global Flavors at Home: Easy Recipes Inspired🍴</h1>
                <p class="home-paragraph">
                    Forget something?
                    Here's your guide, food-to-go where you can cook at the food you crave for.
                </p>
                <button class="home-button"><a href="">Get Started</a></button> -->
            </section>

            <section class="overview-container" id="overview">

                <div class="overview-header">

                    <div class="overview-heading-container">
                        <h1>Recommended</h1>
                        <button class="overview-button">
                            <svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512">
                                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="48" d="M184 112l144 144-144 144" />
                            </svg>
                        </button>
                    </div>

                    <div class="overview-left-link">
                        <ul>
                          <li><a href="">Breakfast</a></li>
                          <li><a href="">Dinner</a></li>
                          <li><a href="">Snack</a></li>
                        </ul>
                    </div>

                </div>


                <div class="overview-cards">

                    <div class="breakfast-card">
                        <div><img src="image/food/champorado.webp" alt="champorado"></div>
                        <div><img src="image/food/tocilog.jpg.webp" alt="tocilog"></div>
                        <div><img src="image/food/Tapsilog.jpg" alt="tapsilog"></div>
                    </div>

                    <div class="dinner-card">
                        <div><img src="image/food/bulalo.jpg" alt="bulalo"></div>
                        <div><img src="image/food/lumpiang-shanghai.jpg" alt="lumpiang-shanghai"></div>
                        <div><img src="image/food/tortang-talong.jpg" alt="tortang-talong"></div>
                    </div>

                    <div class="snack-card">
                        <div><img src="image/food/maruya.jpg" alt="maruya"></div>
                        <div><img src="image/food/lumpia.jpg" alt="lumpia"></div>
                        <div><img src="image/food/kwek-kwek.jpg" alt="kwek-kwek"></div>
                    </div>

                </div>

            </section>

        </main>
    </div>

</body>

</html>
